name: Publish protected versioned documentation

on:
  workflow_dispatch:
    inputs:
      revision:
        description: Exact lowercase source commit SHA
        required: true
        type: string
      version:
        description: Exact final or RC version
        required: true
        type: string
      stage:
        description: Public release stage
        required: true
        type: choice
        options: [archived, public-rc, release]
      successor_of:
        description: Exact RC version superseded by this final release, after release proof
        required: false
        type: string
      deploy:
        description: Publish the validated artifact after protected-environment approval
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate-and-render:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      snapshot_path: ${{ steps.validate.outputs.snapshot_path }}
    steps:
      - id: validate
        shell: bash
        env:
          REVISION: ${{ inputs.revision }}
          VERSION: ${{ inputs.version }}
          STAGE: ${{ inputs.stage }}
          SUCCESSOR_OF: ${{ inputs.successor_of }}
        run: |
          [[ "$REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[1-9][0-9]*)?$ ]]
          if [[ "$STAGE" == public-rc ]]; then
            [[ "$VERSION" == *-rc.* ]]
          else
            [[ "$VERSION" != *-rc.* ]]
          fi
          if [[ -n "$SUCCESSOR_OF" ]]; then
            [[ "$STAGE" == release ]]
            [[ "$SUCCESSOR_OF" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[1-9][0-9]*$ ]]
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$STAGE" == archived ]]; then echo "snapshot_path=archive/$VERSION" >> "$GITHUB_OUTPUT"; else echo "snapshot_path=$VERSION" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.revision }}
          path: source-object
          fetch-depth: 0
      - name: Confirm exact source commit
        shell: bash
        run: |
          test "$(git -C source-object rev-parse HEAD)" = "${{ inputs.revision }}"
          test "$(git -C source-object tag --points-at HEAD "v${{ inputs.version }}")" = "v${{ inputs.version }}"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Render immutable site artifact
        shell: bash
        run: |
          arguments=(
            -PdocumentationRevision="${{ inputs.revision }}"
            -PdocumentationRendererRevision="$(git rev-parse HEAD)"
            -PdocumentationVersion="${{ inputs.version }}"
            -PdocumentationStage="${{ inputs.stage }}"
            -PdocumentationObjectDirectory="$GITHUB_WORKSPACE/source-object"
            -PdocumentationOutputDirectory="$GITHUB_WORKSPACE/build/versioned-documentation"
          )
          if [[ "${{ inputs.stage }}" != archived ]]; then
            arguments+=(
              -PdocumentationBrandingManifest=docs/branding/annodocimal-current.json
              -PdocumentationCurrentBrandingManifest=docs/branding/annodocimal-current.json
            )
          fi
          if [[ -n "${{ inputs.successor_of }}" ]]; then arguments+=(-PdocumentationSuccessorOf="${{ inputs.successor_of }}"); fi
          ./gradlew renderVersionedDocumentation \
            "${arguments[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: versioned-documentation
          path: build/versioned-documentation
          if-no-files-found: error

  deploy-immutable-snapshot:
    if: inputs.deploy
    needs: validate-and-render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: versioned-documentation
          path: rendered
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
          fetch-depth: 1
      - name: Add one previously absent exact snapshot
        shell: bash
        env:
          VERSION: ${{ needs.validate-and-render.outputs.version }}
          SNAPSHOT_PATH: ${{ needs.validate-and-render.outputs.snapshot_path }}
        run: |
          test ! -e "pages/$SNAPSHOT_PATH"
          mkdir -p pages
          mkdir -p "pages/$(dirname "$SNAPSHOT_PATH")" pages/status
          mv "rendered/$SNAPSHOT_PATH" "pages/$SNAPSHOT_PATH"
          cp -R rendered/status/. pages/status/
          git -C pages config user.name github-actions[bot]
          git -C pages config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C pages add "$SNAPSHOT_PATH" status
          git -C pages commit -m "Publish immutable documentation snapshot $SNAPSHOT_PATH"
          git -C pages push origin HEAD:gh-pages
